<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel = 'stylesheet' href = 'style.css'>
</head>
<body>
    <br>
    <div class = 'main'>
        <div class = 'control'>
            <label>
                <select id = 'methods'>
                    <option value = '0'>bubble sort</option>
                    <option value = '1'>selection sort</option>
                    <option selected value = '2'>insertion sort</option>
                </select>
            </label>
            <button onclick = 'rnd()'><b>Generate Random array</b></button>
            <button onclick = 'cont()'>Next Step</button>
            <button id = 'auto' onclick = 'startauto()'>Auto</button>
            <button id = 'stop' style = 'display:none' onclick = 'stopauto()'>Stop</button>
        </div>
        <div class = 'nav'>
            
        </div>
        <div class = 'vars'>
            <h2>Variables</h2>
            <div class = 'var-list'></div>
        </div>
        <div class = 'inf'>
            <h2>Notes</h2>
            <div id = 'alt'><strong>Click Next Step/Auto to start!</strong></div>
        </div>
        <div class = 'array-container'>
            <h2>Array</h2>
            <div class = 'array-ind'></div>
            <div class = 'array'></div>
        </div>
    </div>
    <script src = 'main.js'></script>
</body>
</html>
